server:
  port: 8080

spring:
  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  jpa:
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
  data:
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:redis-node1:6379,redis-node2:6379,redis-node3:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8

app:
  jwt:
    secret: ${JWT_SECRET}
  file-storage:
    type: minio
    minio:
      endpoint: ${MINIO_ENDPOINT}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      bucket: ${MINIO_BUCKET}

logging:
  level:
    com.tracko: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
