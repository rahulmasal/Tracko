spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tracko_dev
    username: tracko
    password: tracko
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

app:
  file-storage:
    type: local
    local:
      upload-dir: ./uploads
  jwt:
    secret: ${JWT_SECRET:devSecretKeyDoNotUseInProduction123456789012345678901234567890}

logging:
  level:
    com.tracko: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    display-request-duration: true
