name: Web CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'

jobs:
  manager-portal:
    name: Manager Portal Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/manager-portal/package-lock.json

      - name: Install dependencies
        run: |
          cd web/manager-portal
          npm ci

      - name: Lint
        run: |
          cd web/manager-portal
          npm run lint

      - name: TypeScript type check
        run: |
          cd web/manager-portal
          npx tsc --noEmit

      - name: Run tests
        run: |
          cd web/manager-portal
          npm test -- --coverage --watchAll=false 2>&1

      - name: Build
        run: |
          cd web/manager-portal
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager-portal-dist
          path: web/manager-portal/dist
          retention-days: 7

  admin-portal:
    name: Admin Portal Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/admin-portal/package-lock.json

      - name: Install dependencies
        run: |
          cd web/admin-portal
          npm ci

      - name: Lint
        run: |
          cd web/admin-portal
          npm run lint

      - name: TypeScript type check
        run: |
          cd web/admin-portal
          npx tsc --noEmit

      - name: Run tests
        run: |
          cd web/admin-portal
          npm test -- --coverage --watchAll=false 2>&1

      - name: Build
        run: |
          cd web/admin-portal
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-portal-dist
          path: web/admin-portal/dist
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [manager-portal, admin-portal]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Manager Portal Docker image
        run: docker build -t tracko-manager-portal:test -f web/manager-portal/Dockerfile ./web

      - name: Build Admin Portal Docker image
        run: docker build -t tracko-admin-portal:test -f web/admin-portal/Dockerfile ./web
