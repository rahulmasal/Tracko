name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tracko_test
          POSTGRES_USER: tracko_user
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'test_password_ci_only' }}
        ports:
          - 5432:5432
        volumes:
          - ./database/migrations/V1__initial_schema.sql:/docker-entrypoint-initdb.d/V1__initial_schema.sql:ro
          - ./database/migrations/V2__seed_data.sql:/docker-entrypoint-initdb.d/V2__seed_data.sql:ro
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          cd backend
          mvn clean compile -B

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tracko_test
          SPRING_DATASOURCE_USERNAME: tracko_user
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'test_password_ci_only' }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd backend
          mvn test -B

      - name: Check dependencies for vulnerabilities
        run: |
          cd backend
          mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 || echo "Dependency check completed with warnings"

      - name: Build Docker image
        run: |
          docker build -t tracko-backend:test ./backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tracko-backend:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential hardcoded secrets..."
          ! grep -rn "password.*=.*['\"]" backend/src/ --include="*.java" --include="*.yml" --include="*.properties" | grep -v "getPassword\|setPassword\|passwordHash\|passwordEncoder\|newPassword\|currentPassword\|PasswordRequest\|PasswordResponse\|PasswordReset\|password_hash" || echo "Potential hardcoded secrets found"
